const { useState: useState_c, useEffect: useEffect_c } = React;

function HeroCarousel() {
  const [idx, setIdx] = useState_c(0);
  const [paused, setPaused] = useState_c(false);
  const total = HERO_SLIDES.length;

  useEffect_c(() => {
    if (paused) return;
    const t = setInterval(() => setIdx(i => (i + 1) % total), 4500);
    return () => clearInterval(t);
  }, [paused, total]);

  return (
    <section className="hero"
             onMouseEnter={() => setPaused(true)}
             onMouseLeave={() => setPaused(false)}>
      {HERO_SLIDES.map((src, i) => (
        <img key={i} src={src} alt=""
             className={`hero-slide ${i === idx ? 'active' : ''}`} />
      ))}
      <div className="hero-bars">
        {HERO_SLIDES.map((_, i) => (
          <button key={i}
                  className={`bar ${i === idx ? 'active' : ''}`}
                  onMouseEnter={() => setIdx(i)}
                  aria-label={`Slide ${i + 1}`} />
        ))}
      </div>
    </section>
  );
}

<script>
  (function() {
    var lastY = window.scrollY;
    function onScroll() {
      var bar = document.querySelector('.top-bar');
      if (!bar) return;
      var cur = window.scrollY;
      if (cur < 60) {
        bar.classList.remove('nav-hidden');
        bar.classList.remove('nav-scrolled');
      } else {
        bar.classList.add('nav-scrolled');
        if (cur > lastY + 4) bar.classList.add('nav-hidden');
        else if (cur < lastY - 4) bar.classList.remove('nav-hidden');
      }
      lastY = cur;
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('load', onScroll);
  })();
</script>
