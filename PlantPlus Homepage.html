<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantPlus | Let Plant Lights Up People's Life</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
@font-face {
    font-family: 'Montserrat';
    src: url('Fonts/Montserrat-Medium-7.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Montserrat';
    src: url('Fonts/Montserrat-SemiBold-9.otf') format('opentype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Montserrat';
    src: url('Fonts/Montserrat-Bold-3.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Montserrat';
    src: url('Fonts/Montserrat-ExtraBold-4.otf') format('opentype');
    font-weight: 800;
    font-style: normal;
    font-display: swap;
}
:root {
    --pp-green: #1CAD76;
    --pp-green-dark: #128A5F;
    --pp-green-light: #4FC299;
    --pp-yellow: #CDD200;
    --pp-cream: #F5F3E8;
    --pp-bg: #EDEFE8;
    --pp-text: #1a1a1a;
    --pp-gray: #6b7c73;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow-x: hidden; }
body {
    font-family: 'Montserrat', "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    color: var(--pp-text);
    background: #fff;
    overflow-x: hidden;
}
.design-canvas {
    width: 1920px;
    margin: 0 auto;
    background: #fff;
    position: relative;
}
.pp-wordmark { font-weight: 900; line-height: 0.85; letter-spacing: -0.02em; font-family: "Helvetica Neue", Arial, sans-serif; }
.pp-wordmark .line1, .pp-wordmark .line2 { display: block; }
.pp-wordmark .dot { color: var(--pp-yellow); }

/* ===== NAV ===== */
.top-bar {
    background: white;
    padding: 20px 40px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 1000;
}
.nav-left-group { display: flex; align-items: center; gap: 48px; justify-self: stretch; padding-left: 0; padding-right: 32px; }
.nav-left-group .nav-hamburger { margin-right: -30px; }
.nav-left-group .nav-lang { margin-right: auto; }
.nav-left-group .nav-hamburger + .nav-lang { margin-left: 0; }
.nav-right-group { display: flex; align-items: center; gap: 48px; justify-self: stretch; padding-left: 32px; }
.nav-right-group .nav-search-pill { margin-left: auto; }
.nav-hamburger {
    width: 18px; height: 14px;
    background: transparent; border: none;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; padding: 0;
}
.nav-hamburger span {
    display: block; height: 2px; width: 100%;
    background: var(--pp-text);
}
.nav-link {
    color: var(--pp-green);
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.3px;
    transition: opacity .2s;
    white-space: nowrap;
    font-family: 'Montserrat', "PingFang SC", "Microsoft YaHei", sans-serif;
}
.nav-link:hover { opacity: 0.7; }
.nav-lang { color: var(--pp-green); }
.nav-center { justify-self: center; display: flex; align-items: center; }
.nav-logo-img { height: 48px; width: auto; display: block; }
.nav-search-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--pp-green);
    text-decoration: none;
    font-size: 13px;
    padding: 10px 24px;
    background: #fff;
    border: 2px solid var(--pp-green);
    border-radius: 999px;
    transition: all .2s;
    min-width: 120px;
}
.nav-search-pill:hover { background: var(--pp-green); color: #fff; }

/* ===== Auto-hide on scroll-down nav ===== */
.top-bar { transition: transform 0.35s ease, box-shadow 0.3s ease; will-change: transform; }
.top-bar.nav-scrolled { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.top-bar.nav-hidden { transform: translateY(-100%); }

/* ===== HERO — 单一干净版本 ===== */
.hero-split {
    display: grid;
    grid-template-columns: 40% 60%;
    min-height: 680px;
    background: #fff;
    padding: 0;
    gap: 0;
}
.hero-split-left {
    background: var(--pp-green);
    color: white;
    padding: 100px 60px 72px 72px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    position: relative;
    border-radius: 0;
    min-height: 680px;
}
.hero-split-title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: 0.02em;
    margin-top: 0;
    color: #fff;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.hero-pill-btn {
    margin-top: auto;
    margin-bottom: 0;
    align-self: flex-start;
    background: #fff;
    color: var(--pp-green);
    border: none;
    width: 260px;
    height: 64px;
    padding: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.hero-pill-btn:hover { background: var(--pp-green-dark); color: #fff; }
.hero-split-right {
    position: relative;
    overflow: hidden;
    border-radius: 0;
    padding: 0;
    background: var(--pp-green);
}
.hero-split-right svg,
.hero-split-right img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 48px 0 0 48px;
}

/* ===== MAP SECTION ===== */
.map-section {
    padding: 120px 80px 80px;
    background: white;
}
.map-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 60px;
    align-items: flex-start;
}
.map-kicker {
    font-size: 36px;
    font-weight: 600;
    color: var(--pp-green);
    letter-spacing: 1px;
    margin-bottom: 32px;
    text-transform: uppercase;
    font-family: 'Montserrat', sans-serif;
}
.map-title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: 0.02em;
    margin-bottom: 36px;
    color: #1a1a1a;
    font-family: 'Montserrat', "PingFang SC", "Microsoft YaHei", sans-serif;
}
.map-title-hl { color: var(--pp-green); }
.map-desc {
    font-size: 16px;
    line-height: 1.9;
    color: #4a4a4a;
    max-width: 480px;
    font-family: 'Montserrat', "PingFang SC", "Microsoft YaHei", sans-serif;
}
.map-image-wrap { width: 100%; }
.map-image-wrap img { display: block; width: 100%; height: auto; }
.map-right { position: relative; min-height: 320px; }
.map-sparkle {
    position: absolute;
    top: -56px;
    right: -16px;
    width: 80px;
    z-index: 2;
    pointer-events: none;
}
.map-sparkle img { display: block; width: 100%; height: auto; }

.map-stats {
    max-width: 720px;
    margin: 48px 0 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px 48px;
    padding-top: 0;
}
.stat-card {
    padding: 8px 20px;
    border-left: 4px solid var(--pp-green-dark);
    position: relative;
}
.stat-label {
    font-size: 18px;
    color: var(--pp-green);
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 0.3px;
    font-family: 'Montserrat', sans-serif;
}
.stat-value {
    font-size: 56px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 0.01em;
    font-family: 'Montserrat', sans-serif;
}
.stat-value span {
    font-size: 20px;
    font-weight: 500;
    color: #888;
    margin-left: 6px;
}

/* ===== IMAGE GRID ===== */
.grid-section { padding: 60px 0 60px; position: relative; }
.grid-panel-wrap { position: relative; max-width: 100%; }
.grid-panel-img { display: block; width: 100%; height: auto; }
.grid-btn {
    position: absolute;
    left: 8%;
    bottom: 8%;
    padding: 16px 36px;
    font-size: 18px;
    font-weight: 600;
    background: #fff;
    color: var(--pp-green);
    border: none;
    border-radius: 999px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.5px;
    z-index: 4;
    transition: all .2s;
    font-family: 'Montserrat', "PingFang SC", "Microsoft YaHei", sans-serif;
}
.grid-btn:hover { background: var(--pp-green); color: #fff; }

/* ===== TWO CARDS ===== */
.twocards-section {
    padding: 60px 64px 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    max-width: 1920px;
    margin: 0 auto;
    box-sizing: border-box;
}
.twocard {
    position: relative;
    min-height: 440px;
    overflow: hidden;
    border-radius: 6px;
    background: #D7E4D8;
}
.twocard.twocard--right { background: #DCE3E5; }
.twocard-photo { position: absolute; inset: 0; z-index: 1; }
.twocard-photo img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity .4s ease;
}
.twocard::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    background-image: url('%E5%9B%BE%202x/%E7%94%BB%E6%9D%BF%2014%402x-100.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity .4s ease;
}
.twocard.twocard--right::before {
    background-image: url('%E5%9B%BE%202x/%E7%94%BB%E6%9D%BF%2015%402x-100.jpg');
}
.twocard:hover::before { opacity: 1; }
.twocard-btn-top {
    position: absolute;
    top: 36px;
    right: 36px;
    background: var(--pp-green);
    color: #fff;
    border: none;
    padding: 18px 44px;
    font-family: 'Montserrat', "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 999px;
    z-index: 4;
    transition: all .2s;
    white-space: nowrap;
    text-decoration: none;
    display: inline-block;
}
.twocard-btn-top:hover { background: var(--pp-green-dark); }
.twocard-body {
    position: relative;
    z-index: 3;
    padding: 0 44px 40px;
    margin-top: auto;
    transition: opacity .35s ease;
}
.twocard:hover .twocard-body { opacity: 0; }
.twocard-title {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.4;
    color: #1a1a1a;
    letter-spacing: 0.02em;
    transition: opacity .35s ease;
    font-family: 'Montserrat', "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* ===== FOOTER ===== */
.footer-new {
    background: var(--pp-green);
    color: white;
    padding: 80px 80px 80px;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
}
.footer-new-inner {
    max-width: 1760px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.2fr 2.5fr;
    gap: 80px;
    position: relative;
    z-index: 2;
}
.footer-new-logo {
    width: 200px;
    height: 64px;
    background: url('logo%202.png') no-repeat left center;
    background-size: contain;
    margin-bottom: 18px;
}
.footer-new-logo img { display: none; }
.footer-new-slogan {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    margin-bottom: 40px;
    text-transform: uppercase;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
}
.footer-new-contact {
    display: flex;
    flex-direction: column;
    gap: 18px;
    font-size: 12px;
    line-height: 1.7;
    max-width: 420px;
}
.contact-block { display: flex; flex-direction: column; gap: 2px; }
.contact-block strong {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
    color: white;
}
.contact-block span {
    font-size: 12px;
    color: #fff;
    line-height: 1.55;
}
.footer-new-links {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    padding-top: 4px;
}
.footer-new-col h4 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: white;
    margin-bottom: 32px;
    font-family: 'Montserrat', sans-serif;
}
.footer-new-col ul { list-style: none; }
.footer-new-col li { margin-bottom: 16px; }
.footer-new-col a {
    color: white;
    text-decoration: none;
    font-size: 14px;
    transition: opacity .2s;
    font-family: 'Montserrat', sans-serif;
}
.footer-new-col a:hover { opacity: 0.75; }
.footer-sparkle {
    position: absolute;
    right: 64px;
    bottom: 40px;
    width: 64px;
    z-index: 2;
    pointer-events: none;
}
.footer-sparkle img { width: 100%; height: auto; display: block; }

/* ===== Scroll to top ===== */
.scroll-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 44px;
    height: 44px;
    background: var(--pp-text);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 99;
    font-size: 18px;
    border-radius: 50%;
}
.scroll-top.visible { opacity: 1; pointer-events: auto; }
.scroll-top:hover { background: var(--pp-green); }

/* ===== Tweaks panel ===== */
.tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 320px;
    background: white;
    border: 1px solid #ddd;
    z-index: 2000;
    font-size: 13px;
    max-height: 80vh;
    overflow-y: auto;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.tweaks-header {
    padding: 14px 18px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--pp-text);
    color: white;
    border-radius: 6px 6px 0 0;
}
.tweaks-body { padding: 16px 18px; }
.tweak-row { margin-bottom: 16px; }
.tweak-row label {
    display: block;
    font-weight: 700;
    font-size: 12px;
    margin-bottom: 8px;
    color: var(--pp-text);
    letter-spacing: 0.5px;
}
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch {
    width: 28px; height: 28px;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 4px;
}
.swatch.active { border-color: var(--pp-text); }
textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    font-family: inherit;
    font-size: 12px;
    resize: vertical;
    border-radius: 4px;
}

/* ===== Grid row 横排修复 ===== */
.grid-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    position: relative;
}
.grid-cell {
    position: relative;
    overflow: hidden;
    aspect-ratio: 2 / 5;
    background: #ececec;
}
.grid-cell img,
.grid-cell svg {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== 最终微调:Hero 标题/按钮 + 顶部接缝 ===== */

/* 标题再大一点,整体往下压 */
.hero-split-left {
    padding: 160px 60px 140px 72px;   /* 上下 padding 加大,文字下移 */
    justify-content: flex-start;       /* 标题贴上,按钮跟着标题不再撑到底 */
    gap: 56px;                          /* 标题和按钮之间的间距 */
}
.hero-split-title {
    font-size: 84px;                    /* 从 72px 加大到 84px */
    line-height: 1.2;
}

/* 按钮变大、不再 push 到底部 */
.hero-pill-btn {
    margin-top: 0;                      /* 取消 auto,跟着标题排列 */
    width: 300px;                       /* 从 260px 加大 */
    height: 72px;                       /* 从 64px 加大 */
    font-size: 20px;                    /* 从 18px 加大 */
    font-weight: 700;
}

/* 顶部接缝:隐藏 hero 右侧图片左圆角(避免和导航栏交界处的视觉错位) */
.hero-split-right {
    overflow: hidden;
}
.hero-split-right img,
.hero-split-right svg {
    border-radius: 0;                   /* 去掉左圆角,左右图无缝拼接 */
}

/* ===== Hero 最终对齐:消除上下白边 + 按钮下移 ===== */

/* 左右两块都用足够的高度,确保上下顶满,无白边 */
.hero-split {
    min-height: 760px;          /* 比内容总高度大,撑满 */
    align-items: stretch;        /* 左右子块拉伸到一致高度 */
}
.hero-split-left {
    min-height: 760px;
    padding: 140px 60px 100px 72px;  /* 上 padding 减小,下 padding 增大,让按钮下移 */
    gap: 80px;                   /* 标题和按钮之间间距加大 */
}
.hero-split-right {
    min-height: 760px;
}
.hero-split-right img,
.hero-split-right svg {
    height: 100%;
    min-height: 760px;
    object-fit: cover;
    object-position: center;
}

/* ===== Map desc 黄色 + 解锁更多空间按钮再放大一点 + 底部 light 放大 ===== */
.map-desc {
    color: var(--pp-yellow);
    font-weight: 600;
}

.grid-btn {
    padding: 20px 44px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.6px;
}

.footer-sparkle {
    width: 96px;
    right: 48px;
    bottom: 48px;
}
.footer-sparkle img {
    width: 100%;
    height: auto;
    display: block;
}

/* ===== 终极修复:Hero 上下白边 ===== */
/* 用 absolute 定位让图片强制撑满父容器,不依赖 height: 100% */

.hero-split-right {
    position: relative;
    overflow: hidden;
    background: var(--pp-green);
}

.hero-split-right img,
.hero-split-right svg {
    position: absolute !important;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
    min-height: 0 !important;
    object-fit: cover;
    object-position: center;
    border-radius: 0 !important;
    display: block;
}

/* 同时移除右侧图片底色干扰,让左右拼接更干净 */
.hero-split-right {
    background: transparent;
}

/* ===== Hero 椭圆过渡 + 按钮再下移 20px ===== */

/* 加回右侧图片的左圆角(椭圆过渡效果) */
.hero-split-right img,
.hero-split-right svg {
    border-radius: 48px 0 0 48px !important;
}

/* 让左侧绿块的右边缘也跟着图片的圆角弧度走,避免拼接处不齐 */
.hero-split-right {
    background: var(--pp-green);
}

/* 按钮再往下移 20px */
.hero-split-left {
    gap: 100px;   /* 从 80px 改成 100px,标题和按钮间距加大 20px */
}

/* ===== Footer light 放大到 3 倍 ===== */
.footer-sparkle {
    width: 288px;       /* 96px → 288px(约 3 倍) */
    right: 64px;
    bottom: 64px;
}

/* ============================================================
   Mobile — 横板缩小版(保持电脑端的横向布局结构,只缩小元素尺寸)
   ============================================================ */
@media (max-width: 768px) {
    /* ----- 全局禁止横向滚动 ----- */
    html, body { overflow-x: hidden; }
    .design-canvas {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
    }

    /* ----- Nav ----- */
    .top-bar {
        padding: 8px 12px;
        gap: 8px;
    }
    .nav-left-group, .nav-right-group { gap: 10px; padding: 0; }
    .nav-link {
        font-size: 9px;
        letter-spacing: 0.2px;
    }
    .nav-logo-img { height: 24px; }
    .nav-search-pill {
        padding: 4px 10px;
        font-size: 9px;
        min-width: 0;
        gap: 4px;
        border-width: 1px;
    }

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script>
  (function() {
    var lastY = window.scrollY;
    function onScroll() {
      var bar = document.querySelector('.top-bar');
      if (!bar) return;
      var cur = window.scrollY;
      if (cur < 60) {
        bar.classList.remove('nav-hidden');
        bar.classList.remove('nav-scrolled');
      } else {
        bar.classList.add('nav-scrolled');
        if (cur > lastY + 4) bar.classList.add('nav-hidden');
        else if (cur < lastY - 4) bar.classList.remove('nav-hidden');
      }
      lastY = cur;
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('load', onScroll);
  })();
</script>
