<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantPlus | Let Plant Lights Up People's Life</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
    --pp-green: #16A34A;
    --pp-green-dark: #15803D;
    --pp-green-light: #4BC28A;
    --pp-yellow: #D4D83A;
    --pp-cream: #F5F3E8;
    --pp-bg: #EDEFE8;
    --pp-text: #1a3d2a;
    --pp-gray: #6b7c73;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    color: var(--pp-text);
    background: #fff;
    overflow-x: hidden;
}
.design-canvas {
    width: 1920px;
    margin: 0 auto;
    background: #fff;
    position: relative;
}
.pp-wordmark { font-weight: 900; line-height: 0.85; letter-spacing: -0.02em; font-family: "Helvetica Neue", Arial, sans-serif; }
.pp-wordmark .line1, .pp-wordmark .line2 { display: block; }
.pp-wordmark .dot { color: var(--pp-yellow); }

/* ===== NAV ===== */
.top-bar {
    background: white;
    padding: 20px 40px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 1000;
}
.nav-left-group { display: flex; align-items: center; gap: 48px; justify-self: stretch; padding-left: 0; padding-right: 32px; }
.nav-left-group .nav-hamburger { margin-right: -30px; }
.nav-left-group .nav-lang { margin-right: auto; }
.nav-left-group .nav-hamburger + .nav-lang { margin-left: 0; }
.nav-right-group { display: flex; align-items: center; gap: 48px; justify-self: stretch; padding-left: 32px; }
.nav-right-group .nav-search-pill { margin-left: auto; }
.nav-hamburger {
    width: 18px; height: 14px;
    background: transparent; border: none;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; padding: 0;
}
.nav-hamburger span {
    display: block; height: 2px; width: 100%;
    background: var(--pp-text);
}
.nav-link {
    color: var(--pp-green);
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.5px;
    transition: opacity .2s;
    white-space: nowrap;
}
.nav-link:hover { opacity: 0.7; }
.nav-lang { color: var(--pp-green); }
.nav-center { justify-self: center; color: var(--pp-green); }
.nav-center .pp-wordmark { font-size: 22px; }
.nav-search-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--pp-green);
    text-decoration: none;
    font-size: 13px;
    padding: 10px 24px;
    background: #fff;
    border: 2px solid var(--pp-green);
    border-radius: 999px;
    transition: all .2s;
    min-width: 120px;
}
.nav-search-pill:hover { background: var(--pp-green); color: #fff; }

/* ===== Auto-hide on scroll-down nav ===== */
.top-bar { transition: transform 0.35s ease, box-shadow 0.3s ease; will-change: transform; }
.top-bar.nav-scrolled { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.top-bar.nav-hidden { transform: translateY(-100%); }

/* ===== HERO ===== */
.hero-split {
    display: grid;
    grid-template-columns: 40% 60%;
    min-height: 680px;
    background: #fff;
    padding: 0;
    gap: 0;
}
.hero-split-left {
    background: var(--pp-green);
    color: white;
    padding: 100px 60px 72px 72px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    position: relative;
    border-radius: 0;
    min-height: 680px;
}
.hero-split-title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: 0.02em;
    margin-top: 0;
    white-space: normal;
}
.hero-pill-btn {
    margin-top: auto;
    margin-bottom: 0;
    align-self: flex-start;
    background: transparent;
    color: white;
    border: 1.5px solid rgba(255,255,255,0.9);
    width: 260px;
    height: 64px;
    padding: 0;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all .2s;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.hero-pill-btn:hover { background: white; color: var(--pp-green); }
.hero-split-right {
    position: relative;
    overflow: hidden;
    border-radius: 0;
    padding: 0;
    background: var(--pp-green);
}
.hero-split-right svg,
.hero-split-right img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 48px 0 0 48px;
}

/* ===== MAP SECTION ===== */
.map-section {
    padding: 120px 80px 80px;
    background: white;
}
.map-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 60px;
    align-items: flex-start;
}
.map-kicker {
    font-size: 18px;
    font-weight: 700;
    color: var(--pp-green);
    letter-spacing: 3.5px;
    margin-bottom: 32px;
    text-transform: uppercase;
}
.map-title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    color: #000;
}
.map-title-hl {
    color: var(--pp-green);
}
.map-desc {
    font-size: 15px;
    line-height: 1.8;
    color: #555;
    max-width: 460px;
}
.map-right {
    position: relative;
    min-height: 320px;
}
.map-footnote {
    position: absolute;
    right: 0;
    bottom: -18px;
    font-size: 10px;
    color: #9aa699;
    letter-spacing: 0.3px;
}
.map-sparkle {
    position: absolute;
    top: -10px;
    right: 40px;
}
.map-svg { width: 100%; }

.map-stats {
    max-width: 720px;
    margin: 48px 0 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px 48px;
    padding-top: 0;
}
.stat-card {
    padding: 8px 20px;
    border-left: 4px solid var(--pp-green-dark);
    position: relative;
}
.stat-label {
    font-size: 16px;
    color: var(--pp-green-dark);
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 0.2px;
}
.stat-value {
    font-size: 44px;
    font-weight: 700;
    color: var(--pp-text);
    letter-spacing: -0.02em;
}
.stat-value span {
    font-size: 18px;
    font-weight: 500;
    color: var(--pp-gray);
    margin-left: 4px;
}

/* ===== IMAGE GRID ===== */
.grid-section {
    padding: 0 0 80px;
    position: relative;
}
.grid-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    max-width: 100%;
    margin: 0 auto;
    position: relative;
}
.grid-btn {
    position: absolute;
    left: 32px;
    bottom: 32px;
    background: rgba(255,255,255,0.95);
    color: var(--pp-green);
    border: none;
    padding: 14px 30px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 999px;
    letter-spacing: 0.5px;
    z-index: 4;
    backdrop-filter: blur(4px);
    text-decoration: none;
    display: inline-block;
}
.grid-btn:hover { background: var(--pp-green); color: white; }
.grid-cell {
    aspect-ratio: 2 / 5;
    overflow: hidden;
    background: #e2e2d4;
    position: relative;
}
.grid-cell svg,
.grid-cell img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.grid-panel-img {
    display: block;
    width: 100%;
    height: auto;
}
.grid-row.grid-row-single { display: block; }

/* ===== TWO CARDS ===== */
.twocards-section {
    padding: 40px 80px 100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1920px;
    margin: 0 auto;
}
.twocard {
    background: #E8EDE3;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
}
.twocard-photo {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.7;
    transition: opacity 0.4s ease;
}
.twocard-photo svg,
.twocard-photo img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.twocard::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,237,227,0.55), rgba(232,237,227,0.3));
    z-index: 2;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: none;
}

/* ===== [需求2] 双卡 hover：图片变清晰、标题/水印淡出、按钮保留 ===== */
.twocard:hover .twocard-photo { opacity: 1; }
.twocard:hover::after { opacity: 0; }
.twocard:hover .twocard-title { opacity: 0; }
.twocard:hover .twocard-watermark { opacity: 0; }
.twocard-watermark {
    position: absolute;
    top: 32px;
    left: 40px;
    font-size: 48px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    font-family: Georgia, serif;
    font-style: italic;
    letter-spacing: -0.02em;
    z-index: 3;
    line-height: 1;
    transition: opacity 0.4s ease;
}
.twocard-btn-top {
    position: absolute;
    top: 32px;
    right: 32px;
    background: var(--pp-green);
    color: white;
    border: none;
    padding: 13px 32px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 999px;
    z-index: 3;
    transition: all .2s;
    white-space: nowrap;
    text-decoration: none;
    display: inline-block;
}
.twocard-btn-top:hover { background: var(--pp-green-dark); }
.twocard-body {
    position: relative;
    z-index: 3;
    padding: 48px;
    margin-top: auto;
}
.twocard-title {
    font-size: 38px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--pp-text);
    transition: opacity 0.4s ease;
}

/* ===== FOOTER ===== */
.footer-new {
    background: var(--pp-green);
    color: white;
    padding: 72px 80px 320px;
    position: relative;
    overflow: hidden;
}
.footer-new-inner {
    max-width: 1760px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.2fr 2.5fr;
    gap: 80px;
    padding-bottom: 56px;
    position: relative;
    z-index: 2;
}
.footer-new-logo { margin-bottom: 14px; }
.footer-new-logo .pp-wordmark { color: white; font-size: 36px; }
.footer-new-slogan {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    opacity: 0.9;
    margin-bottom: 28px;
    text-transform: uppercase;
}
.footer-new-contact {
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-size: 12px;
    line-height: 1.7;
    opacity: 0.9;
    max-width: 380px;
}
.contact-block { display: flex; flex-direction: column; gap: 2px; }
.contact-block strong {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    color: white;
}
.contact-block span {
    font-size: 10.5px;
    opacity: 0.85;
    line-height: 1.5;
}
.footer-new-links {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    padding-top: 4px;
}
.footer-new-col h4 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: white;
    margin-bottom: 18px;
}
.footer-new-col ul { list-style: none; }
.footer-new-col li { margin-bottom: 8px; }
.footer-new-col a {
    color: white;
    text-decoration: none;
    font-size: 12px;
    opacity: 0.9;
    transition: opacity .2s;
}
.footer-new-col a:hover { opacity: 1; }

.footer-new-watermark {
    font-size: 320px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.03em;
    color: rgba(255,255,255,0.22);
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 60px;
    z-index: 1;
    white-space: nowrap;
    pointer-events: none;
    font-family: "Helvetica Neue", Arial, sans-serif;
}

.footer-new-bottom {
    max-width: 1760px;
    margin: 0 auto;
    padding: 16px 0 0;
    border-top: 1px solid rgba(255,255,255,0.2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    opacity: 0.9;
    position: absolute;
    left: 80px;
    right: 80px;
    bottom: 24px;
    z-index: 3;
    flex-wrap: wrap;
    gap: 12px;
}
.footer-bottom-left, .footer-bottom-right { font-size: 10px; }
.footer-bottom-right a { color: white; text-decoration: none; }
.footer-bottom-right a:hover { opacity: 1; }

/* ===== Scroll to top ===== */
.scroll-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 44px;
    height: 44px;
    background: var(--pp-text);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 99;
    font-size: 18px;
    border-radius: 50%;
}
.scroll-top.visible { opacity: 1; pointer-events: auto; }
.scroll-top:hover { background: var(--pp-green); }

/* ===== Tweaks panel ===== */
.tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 320px;
    background: white;
    border: 1px solid #ddd;
    z-index: 2000;
    font-size: 13px;
    max-height: 80vh;
    overflow-y: auto;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.tweaks-header {
    padding: 14px 18px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--pp-text);
    color: white;
    border-radius: 6px 6px 0 0;
}
.tweaks-body { padding: 16px 18px; }
.tweak-row { margin-bottom: 16px; }
.tweak-row label {
    display: block;
    font-weight: 700;
    font-size: 12px;
    margin-bottom: 8px;
    color: var(--pp-text);
    letter-spacing: 0.5px;
}
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch {
    width: 28px; height: 28px;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 4px;
}
.swatch.active { border-color: var(--pp-text); }
textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    font-family: inherit;
    font-size: 12px;
    resize: vertical;
    border-radius: 4px;
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
    .top-bar { grid-template-columns: auto 1fr auto; padding: 16px 20px; gap: 16px; }
    .nav-left-group { gap: 16px; }
    .nav-left-group .nav-link:not(.nav-lang) { display: none; }
    .nav-right-group { gap: 16px; }
    .nav-right-group .nav-link { display: none; }
    .hero-split { grid-template-columns: 1fr; padding: 0; min-height: auto; }
    .hero-split-left { padding: 40px 28px; min-height: auto; }
    .hero-split-title { font-size: 40px; white-space: normal; }
    .hero-split-right { min-height: 280px; }
    .map-section { padding: 48px 20px; }
    .map-inner { grid-template-columns: 1fr; gap: 32px; }
    .map-title { font-size: 40px; }
    .map-stats { grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-row { grid-template-columns: repeat(2, 1fr); }
    .grid-btn { position: static; margin: 16px auto 0; display: block; }
    .twocards-section { grid-template-columns: 1fr; }
    .twocard-title { font-size: 26px; }
    .footer-new { padding: 40px 20px 16px; }
    .footer-new-inner { grid-template-columns: 1fr; gap: 32px; }
    .footer-new-links { grid-template-columns: 1fr 1fr; }
    .footer-new-bottom { flex-direction: column; gap: 8px; text-align: center; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/logo.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script>
  (function() {
    var lastY = window.scrollY;
    function onScroll() {
      var bar = document.querySelector('.top-bar');
      if (!bar) return;
      var cur = window.scrollY;
      if (cur < 60) {
        bar.classList.remove('nav-hidden');
        bar.classList.remove('nav-scrolled');
      } else {
        bar.classList.add('nav-scrolled');
        if (cur > lastY + 4) bar.classList.add('nav-hidden');
        else if (cur < lastY - 4) bar.classList.remove('nav-hidden');
      }
      lastY = cur;
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('load', onScroll);
  })();
</script>
</body>
</html>
