<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系列产品 | PlantPlus</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
    --pp-green: #16A34A;
    --pp-green-dark: #15803D;
    --pp-green-light: #4BC28A;
    --pp-yellow: #D4D83A;
    --pp-cream: #F5F3E8;
    --pp-bg: #EDEFE8;
    --pp-text: #1a3d2a;
    --pp-gray: #6b7c73;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    color: var(--pp-text);
    background: #fff;
    overflow-x: hidden;
}
.pp-wordmark { font-weight: 900; line-height: 0.85; letter-spacing: -0.02em; font-family: "Helvetica Neue", Arial, sans-serif; }
.pp-wordmark .line1, .pp-wordmark .line2 { display: block; }
.pp-wordmark .dot { color: var(--pp-yellow); }

/* ===== NAV ===== */
.top-bar { background: white; padding: 20px 40px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px; position: sticky; top: 0; z-index: 1000; }
.nav-left-group { display: flex; align-items: center; gap: 48px; justify-self: stretch; padding-right: 32px; }
.nav-left-group .nav-hamburger { margin-right: -30px; }
.nav-left-group .nav-lang { margin-right: auto; }
.nav-right-group { display: flex; align-items: center; gap: 48px; justify-self: stretch; padding-left: 32px; }
.nav-right-group .nav-search-pill { margin-left: auto; }
.nav-hamburger { width: 18px; height: 14px; background: transparent; border: none; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; padding: 0; }
.nav-hamburger span { display: block; height: 2px; width: 100%; background: var(--pp-text); }
.nav-link { color: var(--pp-green); text-decoration: none; font-weight: 500; font-size: 14px; letter-spacing: 0.5px; transition: opacity .2s; white-space: nowrap; }
.nav-link:hover { opacity: 0.7; }
.nav-link.active { color: var(--pp-green-dark); font-weight: 700; }
.nav-center { justify-self: center; color: var(--pp-green); }
.nav-center .pp-wordmark { font-size: 22px; }
.nav-search-pill { display: inline-flex; align-items: center; gap: 8px; color: var(--pp-green); text-decoration: none; font-size: 13px; padding: 10px 24px; background: #fff; border: 2px solid var(--pp-green); border-radius: 999px; transition: all .2s; min-width: 120px; }
.nav-search-pill:hover { background: var(--pp-green); color: #fff; }

/* ===== Auto-hide on scroll-down nav ===== */
.top-bar { transition: transform 0.35s ease, box-shadow 0.3s ease; will-change: transform; }
.top-bar.nav-scrolled { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.top-bar.nav-hidden { transform: translateY(-100%); }

/* ===== 5 product category bands ===== */
.cat-stack { position: relative; width: 100%; background: #fff; }
.cat-stack-inner { position: relative; width: 100%; }
.cat-stack-inner img { display: block; width: 100%; height: auto; }
.cat-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 28px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    border: 1.5px solid rgba(255,255,255,0.75);
    border-radius: 999px;
    text-decoration: none;
    transition: all .2s;
    white-space: nowrap;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
}
.cat-label:hover { background: rgba(255,255,255,0.3); }
/* Position each label centered on its respective horizontal strip (5 equal bands) */
.cat-label.l1 { top: 10%; }
.cat-label.l2 { top: 30%; }
.cat-label.l3 { top: 50%; transform: translate(-50%, -50%); }
.cat-label.l4 { top: 70%; }
.cat-label.l5 { top: 90%; transform: translate(-50%, -100%); }

/* ===== Gallery section — 2×2 grid, photos + gray composition tiles ===== */
.gallery-section { padding: 80px 80px 100px; background: #fff; }
.gallery-inner { max-width: 1400px; margin: 0 auto; }
.gallery-header { margin-bottom: 48px; text-align: center; position: relative; }
.gallery-title { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; color: var(--pp-text); line-height: 1.15; }
.gallery-title .accent { color: var(--pp-green); }

.gallery-2x2 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 240px 240px; gap: 20px; }
.g-cell { border-radius: 8px; overflow: hidden; position: relative; }
.g-cell.photo { background: var(--pp-bg); }
.g-cell.photo img { display: block; width: 100%; height: 100%; object-fit: cover; }
.g-cell.gray { background: #DCE0D6; display: flex; align-items: center; justify-content: center; color: var(--pp-yellow); }
.g-cell.gray .dashes { display: flex; gap: 8px; }
.g-cell.gray .dashes span { width: 14px; height: 4px; background: var(--pp-yellow); border-radius: 2px; transform: rotate(20deg); }

/* ===== [需求4] 多组 2×2 + 左右箭头切换 ===== */
.showcase-wrap { position: relative; padding: 0 64px; }
.showcase-viewport { overflow: hidden; }
.showcase-track { display: flex; transition: transform 0.5s ease; }
.showcase-track .gallery-2x2 { flex: 0 0 100%; }
.showcase-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #fff;
    border: 1.5px solid var(--pp-green);
    color: var(--pp-green);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
}
.showcase-arrow.left { left: 0; }
.showcase-arrow.right { right: 0; }
.showcase-arrow:hover { background: var(--pp-green); color: #fff; }
.showcase-dots { display: flex; justify-content: center; gap: 8px; margin-top: 28px; }
.showcase-dots .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c8cdc2;
    border: none;
    padding: 0;
    cursor: pointer;
    transition: all 0.3s ease;
}
.showcase-dots .dot.active {
    width: 24px;
    border-radius: 4px;
    background: var(--pp-green);
}

/* ===== FOOTER ===== */
.footer-new { background: var(--pp-green); color: white; padding: 72px 80px 320px; position: relative; overflow: hidden; }
.footer-new-inner { max-width: 1760px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 2.5fr; gap: 80px; padding-bottom: 56px; position: relative; z-index: 2; }
.footer-new-logo { margin-bottom: 14px; }
.footer-new-logo .pp-wordmark { color: white; font-size: 36px; }
.footer-new-slogan { font-size: 11px; font-weight: 600; letter-spacing: 2.5px; opacity: 0.9; margin-bottom: 28px; text-transform: uppercase; }
.footer-new-contact { display: flex; flex-direction: column; gap: 14px; font-size: 12px; line-height: 1.7; opacity: 0.9; max-width: 380px; }
.contact-block { display: flex; flex-direction: column; gap: 2px; }
.contact-block strong { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 2px; color: white; }
.contact-block span { font-size: 10.5px; opacity: 0.85; line-height: 1.5; }
.footer-new-links { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding-top: 4px; }
.footer-new-col h4 { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: white; margin-bottom: 18px; }
.footer-new-col ul { list-style: none; }
.footer-new-col li { margin-bottom: 8px; }
.footer-new-col a { color: white; text-decoration: none; font-size: 12px; opacity: 0.9; transition: opacity .2s; }
.footer-new-col a:hover { opacity: 1; }
.footer-new-watermark { font-size: 320px; font-weight: 900; line-height: 0.85; letter-spacing: -0.03em; color: rgba(255,255,255,0.22); position: absolute; left: 50%; transform: translateX(-50%); bottom: 60px; z-index: 1; white-space: nowrap; pointer-events: none; font-family: "Helvetica Neue", Arial, sans-serif; }
.footer-new-bottom { max-width: 1760px; margin: 0 auto; padding: 16px 0 0; border-top: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; font-size: 12px; opacity: 0.9; position: absolute; left: 80px; right: 80px; bottom: 24px; z-index: 3; flex-wrap: wrap; gap: 12px; }
.footer-bottom-left, .footer-bottom-right, .footer-bottom-center { font-size: 10px; }

@media (max-width: 1024px) {
    .top-bar { grid-template-columns: 1fr; padding: 16px 24px; }
    .nav-left-group, .nav-right-group { display: none; }
    .cat-label { font-size: 14px; padding: 10px 28px; letter-spacing: 3px; }
    .gallery-section { padding: 60px 24px; }
    .gallery-grid { grid-template-columns: 1fr; grid-template-rows: 200px 200px 200px; }
    .footer-new { padding: 60px 24px 200px; }
    .footer-new-inner { grid-template-columns: 1fr; gap: 40px; }
    .footer-new-links { grid-template-columns: repeat(2, 1fr); }
    .footer-new-watermark { font-size: 120px; bottom: 100px; }
    .footer-new-bottom { position: static; flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/logo.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel">

const IMG = {
  productsStack: 'images/150ppi/151ppi/%E8%B5%84%E6%BA%90%204.jpg',
  galleryA: 'images/150ppi/151ppi/%E8%B5%84%E6%BA%90%203.jpg',
  galleryB: 'images/150ppi/151ppi/%E8%B5%84%E6%BA%90%207.jpg',
  galleryC: 'images/150ppi/151ppi/%E8%B5%84%E6%BA%90%205.jpg',
  galleryD: 'images/150ppi/export%20(1).jpg',
};

// [需求4] 多组 2×2，每组 4 格（photo/gray 混搭），左右箭头切换
const SHOWCASE_GROUPS = [
  [ {type:'photo',src:IMG.galleryA}, {type:'gray'}, {type:'gray'}, {type:'photo',src:IMG.galleryB} ],
  [ {type:'gray'}, {type:'photo',src:IMG.galleryC}, {type:'photo',src:IMG.galleryD}, {type:'gray'} ],
];

const { useState: useState_p } = React;

function ProductShowcase() {
  const [idx, setIdx] = useState_p(0);
  const total = SHOWCASE_GROUPS.length;
  const go = (n) => setIdx((n + total) % total);

  return (
    <div className="showcase-wrap">
      <button className="showcase-arrow left" onClick={() => go(idx - 1)} aria-label="上一组">←</button>
      <div className="showcase-viewport">
        <div className="showcase-track" style={{ transform: `translateX(-${idx * 100}%)` }}>
          {SHOWCASE_GROUPS.map((group, gi) => (
            <div key={gi} className="gallery-2x2">
              {group.map((cell, ci) => (
                cell.type === 'photo'
                  ? <div key={ci} className="g-cell photo"><img src={cell.src} alt="Plant scene" /></div>
                  : <div key={ci} className="g-cell gray"><div className="dashes"><span></span><span></span><span></span></div></div>
              ))}
            </div>
          ))}
        </div>
      </div>
      <button className="showcase-arrow right" onClick={() => go(idx + 1)} aria-label="下一组">→</button>
      <div className="showcase-dots">
        {SHOWCASE_GROUPS.map((_, i) => (
          <button key={i}
                  className={`dot ${i === idx ? 'active' : ''}`}
                  onClick={() => go(i)}
                  aria-label={`组 ${i + 1}`} />
        ))}
      </div>
    </div>
  );
}

const CATEGORIES = [
  { zh: '花架',     pos: 'l1' },
  { zh: '花卉',     pos: 'l2' },
  { zh: '植物推车', pos: 'l3' },
  { zh: '水壶',     pos: 'l4' },
  { zh: '园艺工具', pos: 'l5' },
];

function Nav() {
  return (
    <nav className="top-bar">
      <div className="nav-left-group">
        <button className="nav-hamburger" aria-label="menu"><span></span><span></span><span></span></button>
        <a href="#" className="nav-link nav-lang">语言</a>
        <a href="PlantPlus Company.html" className="nav-link">关于植加</a>
        <a href="PlantPlus Products.html" className="nav-link active">系列产品</a>
      </div>
      <div className="nav-center">
        <a href="PlantPlus Homepage.html" style={{textDecoration:'none',color:'inherit'}}>
          <PPWordmark size={26} />
        </a>
      </div>
      <div className="nav-right-group">
        <a href="PlantPlus Careers.html" className="nav-link">植加招聘</a>
        <a href="PlantPlus Contact.html" className="nav-link">合作联系</a>
        <a href="#" className="nav-search-pill">
          <SearchIcon size={14} />
          <span>搜索</span>
        </a>
      </div>
    </nav>
  );
}

function Sparkle({ size = 36 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 56 56" fill="none">
      <g stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
        <path d="M28 6 L28 18"/><path d="M28 38 L28 50"/>
        <path d="M6 28 L18 28"/><path d="M38 28 L50 28"/>
        <path d="M13 13 L21 21"/><path d="M35 35 L43 43"/>
        <path d="M43 13 L35 21"/><path d="M21 35 L13 43"/>
      </g>
    </svg>
  );
}

function Footer() {
  return (
    <footer className="footer-new">
      <div className="footer-new-inner">
        <div className="footer-new-left">
          <div className="footer-new-logo"><PPWordmark size={40} color="white" /></div>
          <div className="footer-new-slogan">LET PLANT LIGHTS UP PEOPLE'S LIFE</div>
          <div className="footer-new-contact">
            <div className="contact-block">
              <strong>Lishui Office</strong>
              <span>8th Floor, Building 2, Green Valley Information Industry Park,</span>
              <span>Liandu District, Lishui City, Zhejiang Province, China</span>
            </div>
            <div className="contact-block">
              <strong>Hangzhou Office</strong>
              <span>Room 1704, Tower A, Yuecui Victory Centre,</span>
              <span>Shangcheng District, Hangzhou City, Zhejiang Province, China</span>
            </div>
            <div className="contact-block">
              <span>PlantPlus01@hotmail.com</span>
              <span>+86 188 5808 7141</span>
            </div>
          </div>
        </div>
        <div className="footer-new-links">
          <div className="footer-new-col">
            <h4>PRODUCTS</h4>
            <ul>
              <li><a href="PlantPlus Products.html">Plant Stand</a></li>
              <li><a href="PlantPlus Products.html">Plant Pot</a></li>
              <li><a href="PlantPlus Products.html">Gardening Tool</a></li>
              <li><a href="PlantPlus Products.html">Wall Plant Shelf</a></li>
              <li><a href="PlantPlus Products.html">Watering Can</a></li>
            </ul>
          </div>
          <div className="footer-new-col">
            <h4>MORE</h4>
            <ul>
              <li><a href="#">Green House</a></li>
              <li><a href="#">Grow Light</a></li>
              <li><a href="#">Plant Caddy</a></li>
              <li><a href="#">Electric Sprayer</a></li>
            </ul>
          </div>
          <div className="footer-new-col">
            <h4>COMPANY</h4>
            <ul>
              <li><a href="PlantPlus Company.html">About PlantPlus</a></li>
              <li><a href="#">Manufacturing</a></li>
              <li><a href="#">Global Presence</a></li>
              <li><a href="#">Vision &amp; Mission</a></li>
            </ul>
          </div>
          <div className="footer-new-col">
            <h4>BUSINESS</h4>
            <ul>
              <li><a href="#">Wholesale</a></li>
              <li><a href="#">OEM</a></li>
              <li><a href="#">ODM</a></li>
              <li><a href="#">Download Catalog</a></li>
              <li><a href="PlantPlus Contact.html">Contact Sales</a></li>
            </ul>
          </div>
        </div>
      </div>
      <div className="footer-new-watermark">PlantPlus</div>
      <div className="footer-new-bottom">
        <div className="footer-bottom-left">● Global · English</div>
        <div className="footer-bottom-center">© 2026 PlantPlus Technology Co., Ltd. All rights reserved.</div>
        <div className="footer-bottom-right">浙ICP备 2024 01234号</div>
      </div>
    </footer>
  );
}

function App() {
  return (
    <>
      <Nav />

      <section className="cat-stack">
        <div className="cat-stack-inner">
          <img src={IMG.productsStack} alt="PlantPlus product categories" />
          {CATEGORIES.map(c => (
            <a key={c.zh} href="#" className={`cat-label ${c.pos}`}>{c.zh}</a>
          ))}
        </div>
      </section>

      <section className="gallery-section">
        <div className="gallery-inner">
          <div className="gallery-header">
            <h2 className="gallery-title">产品<span className="accent">在真实空间</span>中的样子</h2>
          </div>
          <ProductShowcase />
        </div>
      </section>

      <Footer />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>
  (function() {
    var lastY = window.scrollY;
    function onScroll() {
      var bar = document.querySelector('.top-bar');
      if (!bar) return;
      var cur = window.scrollY;
      if (cur < 60) {
        bar.classList.remove('nav-hidden');
        bar.classList.remove('nav-scrolled');
      } else {
        bar.classList.add('nav-scrolled');
        if (cur > lastY + 4) bar.classList.add('nav-hidden');
        else if (cur < lastY - 4) bar.classList.remove('nav-hidden');
      }
      lastY = cur;
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('load', onScroll);
  })();
</script>
</body>
